<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link type="image/png" sizes="96x96" rel="icon" href="https://img.icons8.com/color/48/pornhub.png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'shimmer': 'shimmer 2s infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <!-- Image and text -->
    <nav class="navbar navbar-light navbar_color container">
        <a class="navbar-brand text-light" href="#">
            <img class="d-inline-block align-top" width="30" height="30"
                src="https://img.icons8.com/glassmorphism/48/clouds.png" alt="clouds" />

            Ad View
        </a>
    </nav>
    <div id="ad-container" class="position-absolute top-50 start-50 translate-middle">
        <!-- From Uiverse.io by Yaya12085 -->
        <div class="relative flex w-80 flex-col rounded-xl bg-white bg-clip-border text-gray-700 shadow-md">
            <div
                class="relative mx-4 -mt-6 h-40 overflow-hidden rounded-xl bg-blue-gray-500 bg-clip-border text-white shadow-lg shadow-blue-gray-500/40 bg-gradient-to-r from-blue-500 to-blue-600">
                <div class="position-absolute top-50 start-50 translate-middle"><img width="48" height="48"
                        src="https://img.icons8.com/deco/48/google-adwords.png" alt="google-adwords" /></div>
            </div>
            <div class="p-6">
                <h5
                    class="mb-2 block font-sans text-xl font-semibold leading-snug tracking-normal text-blue-gray-900 antialiased">

                    Ads Cloud
                </h5>
                <p class="block font-sans text-base font-light leading-relaxed text-inherit antialiased">
                    click to ad unlock video.
                </p>
            </div>
            <div class="p-6 pt-0">
                <button id="ad-btn" data-ripple-light="true" type="button"
                    class="select-none rounded-lg bg-black py-3 px-6 text-center align-middle font-sans text-xs font-bold uppercase text-white shadow-md shadow-black/20 transition-all hover:shadow-lg hover:shadow-black/40 focus:opacity-[0.85] focus:shadow-none active:opacity-[0.85] active:shadow-none disabled:pointer-events-none disabled:opacity-50 disabled:shadow-none w-full">
                    <span id="btn-text">Open Video</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="position-fixed bottom-0 start-50 translate-middle-x p-4" style="z-index: 9999;">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('ad-container');
            const button = document.getElementById('ad-btn');

            // 1. Get the ID from URL search or hash
            let id = '';

            // Search query checking (e.g. ?1 or ?id=1)
            const search = window.location.search.substring(1);
            if (/^\d+$/.test(search)) {
                id = search;
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('id')) {
                    id = urlParams.get('id');
                } else {
                    for (const key of urlParams.keys()) {
                        if (/^\d+$/.test(key)) {
                            id = key;
                            break;
                        }
                    }
                }
            }

            // Hash checking (e.g. #1) if query checking was not successful
            if (!id) {
                const hash = window.location.hash.substring(1);
                if (/^\d+$/.test(hash)) {
                    id = hash;
                }
            }

            if (!id) {
                showNotice('No ID provided', 'Please access the page with an ID at the end of the URL (e.g., <code>?1</code> or <code>#1</code>).');
                return;
            }

            // Set loading state
            setLoading(true);

            // 2. Fetch the corresponding JSON file and ads file in parallel
            Promise.all([
                fetch(`link/links/${id}.json`)
                    .then(res => {
                        if (!res.ok) {
                            throw new Error(`File link/links/${id}.json not found.`);
                        }
                        return res.text();
                    }),
                fetch('link/ads/ads.json')
                    .then(res => {
                        if (!res.ok) {
                            throw new Error('Ads file (link/ads/ads.json) not found.');
                        }
                        return res.json();
                    })
            ])
                .then(([linkText, adsData]) => {
                    // Parse the link text (supporting standard JSON or plain text fallback)
                    let targetUrl = '';
                    try {
                        const data = linkText.trim() ? JSON.parse(linkText) : {};
                        if (typeof data === 'string') {
                            targetUrl = data;
                        } else if (data && typeof data === 'object') {
                            targetUrl = data.link || data.url || data.href || Object.values(data)[0] || '';
                        }
                    } catch (e) {
                        targetUrl = linkText.trim();
                    }

                    if (!targetUrl || (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://'))) {
                        throw new Error(`Invalid or empty URL in links/${id}.json`);
                    }

                    // Get ad URLs from ads.json
                    const adUrls = Object.values(adsData).filter(url => url && typeof url === 'string' && (url.startsWith('http://') || url.startsWith('https://')));
                    if (adUrls.length === 0) {
                        throw new Error('No valid ad URLs found in ads.json');
                    }

                    setLoading(false);

                    // 3. Attach click event handler to the button
                    button.addEventListener('click', (e) => {
                        e.preventDefault();

                        // Show custom toast message
                        showToast('🚀 Opening video in a new tab! Please allow popups if prompted.', 'success');

                        // Dynamically cycle/rotate through the ad links using localStorage to ensure equal distribution
                        let adIndex = parseInt(localStorage.getItem('lastAdIndex') || '-1', 10);
                        adIndex = (adIndex + 1) % adUrls.length;
                        localStorage.setItem('lastAdIndex', adIndex);

                        const dynamicAdUrl = adUrls[adIndex];

                        // Open the ad in a new tab first
                        window.open(dynamicAdUrl, '_blank');

                        // Then open the target link in a new tab
                        const targetTab = window.open(targetUrl, '_blank');

                        // If popup blocking prevents opening the second tab, redirect current tab after a brief delay
                        if (!targetTab || targetTab.closed || typeof targetTab.closed === 'undefined') {
                            setTimeout(() => {
                                window.location.href = targetUrl;
                            }, 1000);
                        }
                    });
                })
                .catch(err => {
                    console.error(err);
                    showNotice('Error Loading Link', err.message || 'Could not load data.');
                });

            function setLoading(isLoading) {
                const btnText = document.getElementById('btn-text');
                if (isLoading) {
                    button.disabled = true;
                    button.style.opacity = '0.7';
                    if (btnText) btnText.textContent = 'Loading...';
                } else {
                    button.disabled = false;
                    button.style.opacity = '1';
                    if (btnText) btnText.textContent = 'Open Video';
                }
            }

            function showToast(message, type = 'success') {
                const container = document.getElementById('toast-container');
                if (!container) return;

                const toast = document.createElement('div');
                toast.className = `flex items-center gap-3 bg-zinc-900/95 border border-zinc-800 text-white px-5 py-3.5 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.5)] backdrop-blur-md transform translate-y-4 opacity-0 transition-all duration-300 max-w-sm mb-3 border-t border-t-zinc-700/20`;

                const icon = type === 'success'
                    ? `<svg class="w-5 h-5 text-emerald-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                    : `<svg class="w-5 h-5 text-amber-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

                toast.innerHTML = `
                    ${icon}
                    <div class="flex-1 text-sm font-medium tracking-wide">${message}</div>
                `;

                container.appendChild(toast);

                // Trigger layout reflow
                toast.offsetHeight;

                // Animate in
                toast.classList.remove('translate-y-4', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');

                // Remove after 4 seconds
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-4', 'opacity-0');
                    setTimeout(() => {
                        toast.remove();
                    }, 300);
                }, 4000);
            }

            function showNotice(title, desc) {
                // Renders a beautiful notice card replacing the button in the center
                container.innerHTML = `
                    <div class="bg-zinc-950/90 border border-zinc-800 text-white p-6 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.6)] backdrop-blur-xl max-w-sm text-center border-t border-t-zinc-700/20">
                        <div class="text-amber-500 mb-4 flex justify-center">
                            <svg class="w-10 h-10 animate-bounce" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold mb-2 text-zinc-100 tracking-wide">${title}</h3>
                        <p class="text-sm text-zinc-400 leading-relaxed">${desc}</p>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
